apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubevision-sa
  namespace: kubevision
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubevision-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "nodes", "services"]
  verbs: ["get", "list", "watch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubevision-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubevision-role
subjects:
- kind: ServiceAccount
  name: kubevision-sa
  namespace: kubevision
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubevision-dashboard
  namespace: kubevision
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubevision
  template:
    metadata:
      labels:
        app: kubevision
    spec:
      serviceAccountName: kubevision-sa
      containers:
      - name: dashboard
        image: kubevision:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: kubevision-service
  namespace: kubevision
spec:
  selector:
    app: kubevision
  ports:
  - name: frontend
    port: 80
    targetPort: 3000
  - name: backend
    port: 3001
    targetPort: 3001
  type: LoadBalancer